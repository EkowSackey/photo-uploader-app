<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos — Digital Art Gallery</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<header class="site-header">
    <span class="wordmark">Fotos::gaLLery</span>
    <a href="/upload" class="btn-primary">Add Artwork</a>
</header>

<main>
    <div class="gallery-container">

        <div th:if="${#lists.isEmpty(photos)}" class="empty-state">
            <p>No artworks yet.</p>
            <a href="/upload" class="btn-primary">Add the first one</a>
        </div>

        <section class="gallery" th:unless="${#lists.isEmpty(photos)}">
            <article class="card" th:each="photo : ${photos}">
                <img th:src="${photo.imageUrl}" th:alt="${photo.title}"
                     th:data-src="${photo.imageUrl}"
                     th:data-title="${photo.title}"
                     th:data-artist="${photo.artist}"
                     class="gallery-img">
                <div class="card-body">
                    <h2 class="card-title" th:text="${photo.title}"></h2>
                    <p class="card-artist" th:text="${photo.artist}"></p>
                    <p class="card-desc" th:text="${photo.description}"></p>
                    <div class="card-actions">
                        <a th:href="@{/photos/{id}/edit(id=${photo.id})}" class="btn-action btn-edit">Edit</a>
                        <form th:action="@{/photos/{id}/delete(id=${photo.id})}" method="post" class="delete-form">
                            <button type="submit" class="btn-action btn-delete">Delete</button>
                        </form>
                    </div>
                </div>
            </article>
        </section>

    </div>
</main>

<footer class="site-footer">
    <p>&copy; 2024 Fotos</p>
</footer>

<div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-caption">
        <span id="lightbox-title"></span>
        <span id="lightbox-artist"></span>
    </div>
</div>

<script th:src="@{/app.js}"></script>
</body>
</html>
