<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Photo Uploader.</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container">
    <h1>Photo Uploader. Pre Lab test 3</h1>

    <form method="post" action="/upload" enctype="multipart/form-data" class="upload-form">
        <label for="file">Image</label>
        <input id="file" type="file" name="file" accept="image/*" required>

        <label for="description"> Add a Description</label>
        <textarea id="description" name="description" rows="3" maxlength="500" required></textarea>

        <button type="submit">Upload</button>
    </form>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <section class="gallery">
        <article class="card" th:each="photo : ${photos}">
            <img th:src="${photo.imageUrl}" th:alt="${photo.description}">
            <p th:text="${photo.description}"></p>
            <small th:text="${photo.createdAt}"></small>
        </article>
    </section>
</div>
</body>
</html>
