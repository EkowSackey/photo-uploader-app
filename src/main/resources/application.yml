server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: fotos
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:photodb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  bucket-name: ${S3_BUCKET_NAME:change-me}
  cloudfront-base-url: ${CLOUDFRONT_BASE_URL:http://localhost:8080/uploads}
  aws-region: ${AWS_REGION:eu-west-1}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:photodb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  thymeleaf:
    cache: false
