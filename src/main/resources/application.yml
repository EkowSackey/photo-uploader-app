server:
  port: ${PORT:8080}

spring:
  application:
    name: fotos
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:photodb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  bucket-name: ${S3_BUCKET_NAME:change-me}
  cloudfront-base-url: ${CLOUDFRONT_BASE_URL:http://localhost:8080/uploads}
  aws-region: ${AWS_REGION:eu-west-1}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:photodb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
